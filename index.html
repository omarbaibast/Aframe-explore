<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Instant 3D Exploration Space</title>
    <!-- Main A-Frame Library -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Environment Component that generates worlds instantly -->
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>

    <!-- The 3D Scene with VR UI enabled -->
    <a-scene xr-mode-ui="enabled: true">
      
      <!-- Change 'preset' to change the entire world: 'volcano', 'egypt', 'forest', 'osiris', 'contact' -->
      <a-entity environment="preset: egypt; seed: 4; ground: hills; playarea: 1"></a-entity>

      <!-- A couple of simple geometric landmarks to explore or walk around -->
      <a-box position="-3 1.5 -7" rotation="0 45 0" width="2" height="3" depth="2" color="#4CC3D9"></a-box>
      <a-sphere position="0 3 -12" radius="2" color="#EF2D5E"></a-sphere>
      <a-cylinder position="4 2.5 -9" radius="0.8" height="5" color="#FFC65D"></a-cylinder>

      <!-- User Camera Rig: Sets eye level and enables WASD + Touch/Look Controls -->
      <a-entity id="rig" position="0 0 0">
        <a-camera look-controls="pointerLockEnabled: true" wasd-controls="acceleration: 65" position="0 1.6 0"></a-camera>
      </a-entity>

    </a-scene>

  </body>
</html>
